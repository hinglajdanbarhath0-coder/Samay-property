<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samay Properties</title>
<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
header {background:#2c3e50; color:white; padding:15px; text-align:center;}
section {padding:20px;}
.box {background:white; padding:15px; margin:10px 0; border-radius:10px;}
button {padding:10px; background:#27ae60; color:white; border:none; border-radius:5px; width: 100%; cursor: pointer;}
input {width: 90%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;}
</style>
</head>

<body>

<header>
<h1>Samay Properties</h1>
<p>Find Your Perfect Property</p>
</header>

<section class="box">
<h2>Buyer Requirement</h2>
<form id="propertyForm">
<label>Type of Property:</label><br>
<input type="text" id="type" placeholder="Flat / Plot / House"><br><br>

<label>How Much Property:</label><br>
<input type="text" id="size" placeholder="Size / Budget"><br><br>

<label>Area:</label><br>
<input type="text" id="area" placeholder="Preferred Area"><br><br>

<button type="button" onclick="sendToWhatsApp()">Submit via WhatsApp</button>
</form>
</section>

<section class="box">
<h2>Available Areas</h2>
<ul>
<li>Vardhman, Rajkot</li>
<li>Ghanteshwar, Rajkot</li>
</ul>
</section>

<section class="box">
<h2>Owner Contact</h2>
<p>Phone: <a href="tel:9825051918">9825051918</a></p>
</section>

<script>
function sendToWhatsApp() {
  const type = document.getElementById('type').value;
  const size = document.getElementById('size').value;
  const area = document.getElementById('area').value;
  
  const phoneNumber = "919825051918"; 
  
  const message = `*Samay Properties - New Requirement*%0A%0A` + 
                  `*Type:* ${type}%0A` + 
                  `*Size/Budget:* ${size}%0A` + 
                  `*Area:* ${area}`;

  const url = `https://wa.me/${phoneNumber}?text=${message}`;
  window.open(url, '_blank');
}
</script>

</body>
</html>
